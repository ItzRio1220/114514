<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>玩命關頭</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #gameContainer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .ui-panel { position: absolute; background: rgba(10, 10, 15, 0.95); padding: 30px; border-radius: 20px; border: 1px solid #333; z-index: 100; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 750px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .ui-panel h2 { text-align: center; color: #ff2222; margin-top: 0; letter-spacing: 2px; }
        .controls-info { text-align: center; font-size: 13px; color: #888; margin-bottom: 20px; }
        
        .ui-layout { display: flex; gap: 20px; align-items: stretch; }
        
        .ui-left { flex: 0 0 320px; display: flex; flex-direction: column; justify-content: space-between; }
        
        .vehicle-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 0; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .vehicle-grid::-webkit-scrollbar { width: 6px; }
        .vehicle-grid::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .vehicle-grid::-webkit-scrollbar-thumb:hover { background: #00d2ff; }
        
        .vehicle-option { background: #1a1a1a; border: 2px solid #444; padding: 12px 8px; cursor: pointer; border-radius: 12px; font-size: 12px; transition: 0.2s; text-align: center; }
        .vehicle-option:hover { background: #2a2a2a; border-color: #00d2ff; transform: translateY(-2px); }
        .vehicle-option.selected { border-color: #00ff88; background: #112a1d; box-shadow: 0 0 15px rgba(0,255,136,0.3); }
        .vehicle-option b { display: block; font-size: 15px; margin-bottom: 4px; color: #fff; }
        .vehicle-option span { font-size: 11px; color: #aaa; }
        
        .ui-right { flex: 1; display: flex; flex-direction: column; }
        #previewContainer { flex: 1; min-height: 250px; width: 100%; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, rgba(40,40,60,1) 0%, rgba(10,10,15,1) 100%); border-radius: 15px; border: 1px solid #444; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); margin-bottom: 15px; }
        
        .color-picker-container { margin-bottom: 10px; }
        .color-picker-container label { font-size: 13px; color: #aaa; margin-bottom: 5px; display: block; }
        #carColor { width: 100%; height: 45px; border: none; background: none; cursor: pointer; }
        
        .start-btn { background: linear-gradient(135deg, #ff2222 0%, #a30000 100%); color: white; border: none; padding: 16px; font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 15px; letter-spacing: 3px; transition: 0.3s; }
        .start-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(255,50,50,0.5); }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 50; }
        .hud-box { position: absolute; background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px); }
        .nitro-bar { width: 200px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        #nitroFill { width: 100%; height: 100%; background: linear-gradient(90deg, #00d2ff, #00ff88); transition: width 0.1s; }
        
        #clickToStart { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 200; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; 
            background: linear-gradient(rgba(20, 0, 40, 0.4), rgba(10, 0, 20, 0.8)), 
                        url('https://images.unsplash.com/photo-1542362567-b07e54358753?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            background-color: #0b001a;
        }
        #clickToStart h1 { color: #fff; font-size: 110px; letter-spacing: 15px; margin: 0 0 20px 0; text-transform: uppercase; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055, 0 0 40px #ff0055, 0 0 80px #ff0055; }
        #clickToStart p { color: #0ff; font-size: 32px; font-weight: bold; letter-spacing: 8px; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        /* 獨立音量控制面板 */
        #volumeControl {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
            background: rgba(0, 0, 0, 0.75); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(8px); align-items: flex-end;
        }
        .vol-row { display: flex; align-items: center; gap: 10px; }
        .vol-row label { font-size: 13px; font-weight: bold; cursor: pointer; color: #ddd; width: 65px; text-align: right; }
        .vol-row input[type="range"] { cursor: pointer; width: 100px; accent-color: #00d2ff; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="volumeControl">
        <div class="vol-row">
            <label for="weatherVolume">⛈️ 天氣</label>
            <input type="range" id="weatherVolume" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="vol-row">
            <label for="sfxVolume">💥 音效</label>
            <input type="range" id="sfxVolume" min="0" max="1" step="0.01" value="0.6">
        </div>
        <div class="vol-row">
            <label for="bgmVolume">🎵 音樂</label>
            <input type="range" id="bgmVolume" min="0" max="1" step="0.01" value="0.4">
        </div>
        
        <div style="margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; width: 100%; display: flex; flex-direction: column; gap: 5px; align-items: flex-end;">
            <label style="font-size: 13px; font-weight: bold; color: #ddd; cursor: pointer;">🎧 切換背景音樂</label>
            <select id="musicSelect" style="background: rgba(0,0,0,0.6); color: #00d2ff; border: 1px solid rgba(255,255,255,0.3); border-radius: 5px; padding: 5px; cursor: pointer; outline: none; font-size: 12px; width: 175px;">
                <option value="https://raw.githubusercontent.com/DaiChi-WW/game-music/main/8%20Bits%20are%20Scary%20Assault%20-%20Pippu%20(youtube).mp3">🎵 音樂一：8 bits are scary</option>
                <option value="https://raw.githubusercontent.com/DaiChi-WW/game-music/main/MAX%20COVERI%20_%20RUNNING%20IN%20THE%2090S%E3%80%90%E9%A0%AD%E6%96%87%E5%AD%97D_INITIAL%20D%E3%80%91%20-%20avex%20(youtube).mp3">🎵 音樂二：RUNNING IN THE 90S</option>
            </select>
        </div>
    </div>

    <audio id="bgMusic" loop>

    </audio>

    <div id="clickToStart">
        <h1>玩命關頭</h1>
        <p>🔊 點擊開始</p>
    </div>

    <canvas id="raceCanvas"></canvas>

    <div class="ui-panel" id="startScreen" style="display:none;">
        <h2>車庫整備</h2>
        <p class="controls-info">WASD 移動 | SPACE 氮氣 | E 發射火箭</p>
        
        <div class="ui-layout">
            <div class="ui-left">
                <div class="vehicle-grid" id="vehicleGrid">
                    <div class="vehicle-option selected" data-type="sedan"><b>🏎️ 轎車</b><span>2命 | 平衡</span></div>
                    <div class="vehicle-option" data-type="pickup"><b>🛻 皮卡</b><span>2命 | 巡航</span></div>
                    <div class="vehicle-option" data-type="veneno"><b>🏎️ Veneno</b><span>1命 | 無限加速</span></div>
                    <div class="vehicle-option" data-type="f1"><b>🏁 F1</b><span>1命 | 無限加速</span></div>
                    <div class="vehicle-option" data-type="gtr"><b>🏎️ GT-R</b><span>1命 | 無限加速</span></div>
                    <div class="vehicle-option" data-type="delorean"><b>🛸 DMC-12</b><span>5倍氮氣 | 飛行模式</span></div>
                    <div class="vehicle-option" data-type="van"><b>🚐 箱型車</b><span>3命 | 撞飛敵車</span></div>
                    <div class="vehicle-option" data-type="truck"><b>🚚 大貨車</b><span>5命 | 絕對撞飛</span></div>
                    <div class="vehicle-option" data-type="bike"><b>🏍️ 重機</b><span>1命 | 稜角暴走</span></div>
                    <div class="vehicle-option" data-type="harley"><b>🛵 哈雷</b><span>1命 | 經典巡航</span></div>
                </div>
            </div>
            
            <div class="ui-right">
                <div id="previewContainer">
                    <canvas id="previewCanvas" width="400" height="250"></canvas>
                </div>
                <div class="color-picker-container">
                    <label>自訂專屬烤漆</label>
                    <input type="color" id="carColor" value="#ff2222">
                </div>
            </div>
        </div>
        
        <button class="start-btn" onclick="Game.confirmStart()">進入世界</button>
    </div>

    <div id="hud">
        <div class="hud-box" style="top: 30px; left: 30px;">
            <div id="scoreTxt" style="font-size: 45px; font-weight: bold; line-height: 1; color: #00ff88;">0</div>
            <div class="nitro-bar"><div id="nitroFill"></div></div>
            <div id="hpDisplay" style="color: #ff4444; font-size: 24px; margin-top: 8px; letter-spacing: 3px;"></div>
            <div id="itemDisplay" style="color: #ffaa00; font-size: 18px; margin-top: 5px; font-weight: bold; letter-spacing: 1px;"></div>
        </div>
        <div class="hud-box" style="top: 30px; right: 30px; text-align: right;">
            <div id="timeTxt" style="font-size: 22px; font-weight: bold;">第 1 天 🕛 12:00</div>
            <div id="envTxt" style="font-size: 14px; color: #00d2ff; margin-top: 5px;">🏙️ 城市 | ☀️ 晴朗</div>
        </div>
    </div>
</div>

<script>
const Config = { CanvasW: 0, CanvasH: 0, RoadW: 600, LaneW: 100, SideW: 0, BaseSpeed: 5 };

function resizeCanvas() {
    Config.CanvasW = window.innerWidth;
    Config.CanvasH = window.innerHeight;
    let canvas = document.getElementById('raceCanvas');
    canvas.width = Config.CanvasW;
    canvas.height = Config.CanvasH;
    Config.SideW = (Config.CanvasW - Config.RoadW) / 2;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const VehiclesData = {
    sedan:    { w: 46, h: 95, hp: 2, accel: 0.8 },
    pickup:   { w: 52, h: 110, hp: 2, accel: 0.75 },
    veneno:   { w: 54, h: 118, hp: 1, accel: 1.3 }, 
    f1:       { w: 58, h: 120, hp: 1, accel: 1.4 }, 
    gtr:      { w: 50, h: 110, hp: 1, accel: 1.3 }, 
    delorean: { w: 48, h: 105, hp: 2, accel: 1.1 },
    van:      { w: 52, h: 115, hp: 3, accel: 0.6 },
    truck:    { w: 62, h: 170, hp: 5, accel: 0.5 },
    bike:     { w: 20, h: 70, hp: 1, accel: 1.1 }, 
    harley:   { w: 26, h: 80, hp: 1, accel: 1.0 } 
};

class SoundEngine {
    constructor() { 
        this.ctx = null; 
        this.weatherNoise = null; 
        this.weatherGain = null;
        this.sfxVol = 0.6; 
        this.weatherVol = 0.5; 
        this.baseWeatherVol = 0; 
    }
    init() { 
        try { 
            this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
            this.osc = this.ctx.createOscillator(); 
            this.filter = this.ctx.createBiquadFilter();
            this.gain = this.ctx.createGain(); 
            
            this.osc.type = 'sawtooth'; 
            this.filter.type = 'lowpass';
            this.filter.frequency.value = 100;
            this.gain.gain.value = 0; 
            
            this.osc.connect(this.filter);
            this.filter.connect(this.gain);
            this.gain.connect(this.ctx.destination); 
            this.osc.start(); 
        } catch(e) {} 
    }
    updateEngine(speed, isNitro) { 
        if(!this.ctx) return; 
        this.osc.frequency.setTargetAtTime(35 + speed * 6, this.ctx.currentTime, 0.1); 
        this.filter.frequency.setTargetAtTime(100 + speed * 150, this.ctx.currentTime, 0.1);
        this.gain.gain.setTargetAtTime((isNitro ? 0.08 : 0.03) * this.sfxVol, this.ctx.currentTime, 0.1); 
    }
    
    playThunder() { 
        if(!this.ctx || this.weatherVol <= 0) return; 
        let o = this.ctx.createOscillator(); 
        let filter = this.ctx.createBiquadFilter();
        let g = this.ctx.createGain(); 
        
        o.type = 'sawtooth'; 
        o.frequency.setValueAtTime(60, this.ctx.currentTime); 
        o.frequency.exponentialRampToValueAtTime(20, this.ctx.currentTime + 3); 
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(500, this.ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 3);

        g.gain.setValueAtTime(1.0 * this.weatherVol, this.ctx.currentTime); 
        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 3); 
        
        o.connect(filter);
        filter.connect(g);
        g.connect(this.ctx.destination); 
        o.start(); o.stop(this.ctx.currentTime + 3); 
    }

    setWeatherVolume(vol) {
        this.weatherVol = vol;
        if (this.weatherGain) {
            this.weatherGain.gain.setTargetAtTime(this.baseWeatherVol * this.weatherVol, this.ctx.currentTime, 0.1);
        }
    }
    
    setWeatherSound(weather) {
        if (!this.ctx) return;
        
        if (this.weatherNoise) {
            this.weatherNoise.stop();
            this.weatherNoise.disconnect();
            this.weatherNoise = null;
        }
        if (weather === 'CLEAR') return;

        let bufferSize = this.ctx.sampleRate * 2; 
        let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1; 
        }

        this.weatherNoise = this.ctx.createBufferSource();
        this.weatherNoise.buffer = buffer;
        this.weatherNoise.loop = true;

        let filter = this.ctx.createBiquadFilter();
        this.weatherGain = this.ctx.createGain();

        if (weather === 'RAIN' || weather === 'STORM') {
            filter.type = 'lowpass';
            filter.frequency.value = 800; 
            this.baseWeatherVol = weather === 'STORM' ? 0.3 : 0.15;
        } else if (weather === 'SNOW') {
            filter.type = 'bandpass';
            filter.frequency.value = 5000; 
            this.baseWeatherVol = 0.05;
        }

        this.weatherGain.gain.value = this.baseWeatherVol * this.weatherVol;

        this.weatherNoise.connect(filter);
        filter.connect(this.weatherGain);
        this.weatherGain.connect(this.ctx.destination);
        this.weatherNoise.start();
    }

    playRocketLaunch() {
        if (!this.ctx || this.sfxVol <= 0) return;
        let osc = this.ctx.createOscillator();
        let filter = this.ctx.createBiquadFilter();
        let gain = this.ctx.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.6);
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(2000, this.ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.6);
        
        gain.gain.setValueAtTime(0.6 * this.sfxVol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.6);
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.6);
    }

    playCrash() { if(!this.ctx || this.sfxVol<=0) return; let o = this.ctx.createOscillator(); let g = this.ctx.createGain(); o.type = 'triangle'; o.connect(g); g.connect(this.ctx.destination); o.frequency.setValueAtTime(150, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.3); g.gain.setValueAtTime(0.5 * this.sfxVol, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3); o.start(); o.stop(this.ctx.currentTime + 0.3); }
    playAnimalHit() { if(!this.ctx || this.sfxVol<=0) return; let o = this.ctx.createOscillator(); let g = this.ctx.createGain(); o.type = 'square'; o.connect(g); g.connect(this.ctx.destination); o.frequency.setValueAtTime(80, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(20, this.ctx.currentTime + 0.2); g.gain.setValueAtTime(0.3 * this.sfxVol, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2); o.start(); o.stop(this.ctx.currentTime + 0.2); }
    playRepairSFX() { if(!this.ctx || this.sfxVol<=0) return; let o = this.ctx.createOscillator(); let g = this.ctx.createGain(); o.type = 'sine'; o.connect(g); g.connect(this.ctx.destination); o.frequency.setValueAtTime(440, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(880, this.ctx.currentTime + 0.2); g.gain.setValueAtTime(0.2 * this.sfxVol, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2); o.start(); o.stop(this.ctx.currentTime + 0.2); }
}

class Entity {
    constructor(x, y, w, h, color, type) { this.x = x; this.y = y; this.w = w; this.h = h; this.color = color; this.type = type; this.vx = 0; this.vy = 0; }
}

class Item extends Entity {
    constructor(x, y, type) { super(x, y, 40, 40, '', type); }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
        ctx.shadowColor = this.type === 'shield' ? '#00bfff' : (this.type === 'nitro' ? '#ffaa00' : (this.type === 'rocket' ? '#ff3333' : '#33ff33'));
        ctx.shadowBlur = 20;

        ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2);
        if (this.type === 'shield') ctx.fillStyle = 'rgba(0, 150, 255, 0.8)';
        if (this.type === 'nitro') ctx.fillStyle = 'rgba(255, 150, 0, 0.8)';
        if (this.type === 'rocket') ctx.fillStyle = 'rgba(255, 50, 50, 0.8)';
        if (this.type === 'repair') ctx.fillStyle = 'rgba(50, 255, 50, 0.8)';
        ctx.fill(); 
        ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
        
        ctx.shadowBlur = 0; 
        ctx.fillStyle = '#fff'; ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        let icon = this.type === 'shield' ? '🛡️' : (this.type === 'nitro' ? '⚡' : (this.type === 'rocket' ? '🚀' : '🔧'));
        ctx.fillText(icon, 0, 2); ctx.restore();
    }
}

class Player extends Entity {
    constructor(x, y, color, type) {
        const d = VehiclesData[type];
        super(x, y, d.w, d.h, color, type);
        this.hp = d.hp; this.accel = d.accel; 
        
        this.maxNitro = (this.type === 'delorean') ? 1000 : 200;
        this.nitro = this.maxNitro; 
        
        this.friction = 0.82;
        this.extraHp = 0; this.ultimateNitroTimer = 0; this.rocketAmmo = 0;
        this.isBurning = 0; 
        this.invulnTimer = 0; 
        this.isBoosting = false; 
    }
    update(keys, weather) {
        let acc = this.accel; 
        
        let isInfiniteNitro = (this.type === 'f1' || this.type === 'veneno' || this.type === 'gtr');
        let isNitro = keys.Space && (this.nitro > 0 || isInfiniteNitro);
        
        if (isNitro && this.ultimateNitroTimer <= 0) { 
            acc *= 1.8; 
            if (!isInfiniteNitro) {
                this.nitro -= 1; 
            }
        } 
        else if (this.nitro < this.maxNitro) {
            let rec = (this.type === 'truck' || this.type === 'van') ? 0.8 : 1.5;
            this.nitro = Math.min(this.maxNitro, this.nitro + rec);
        }

        let curFric = this.friction;
        if(weather === 'RAIN' || weather === 'STORM') curFric = 0.88;
        if(weather === 'SNOW') curFric = 0.94; 

        if (keys.KeyW || keys.ArrowUp) this.vy -= acc;
        if (keys.KeyS || keys.ArrowDown) this.vy += acc;
        if (keys.KeyA || keys.ArrowLeft) this.vx -= acc;
        if (keys.KeyD || keys.ArrowRight) this.vx += acc;

        this.vx *= curFric; this.vy *= curFric;
        this.x += this.vx;  this.y += this.vy;

        this.x = Math.max(Config.SideW + 2, Math.min(Config.CanvasW - Config.SideW - this.w - 2, this.x));
        this.y = Math.max(50, Math.min(Config.CanvasH - this.h - 20, this.y));

        document.getElementById('nitroFill').style.width = Math.max(0, (this.nitro / this.maxNitro) * 100) + "%";
        
        let fullHearts = Math.floor(this.hp);
        let hasHalfHeart = (this.hp % 1 !== 0 && this.hp > 0);
        let hpStr = "❤".repeat(fullHearts);
        if (hasHalfHeart) hpStr += "💔"; 

        if (this.extraHp > 0) hpStr += " 💙";
        document.getElementById('hpDisplay').innerText = hpStr;
        
        let itemStr = "";
        if (this.rocketAmmo > 0) itemStr += `🚀 火箭(E): ${this.rocketAmmo}發  `;
        if (this.ultimateNitroTimer > 0) itemStr += `⚡ 終極氮氣: ${this.ultimateNitroTimer.toFixed(1)}s`;
        document.getElementById('itemDisplay').innerText = itemStr;

        if (this.isBurning > 0) this.isBurning--;
        if (this.invulnTimer > 0) this.invulnTimer--;
        
        this.isBoosting = isNitro || this.ultimateNitroTimer > 0;

        return this.isBoosting;
    }
}

class Enemy extends Entity {
    constructor(x, y, type, color, isOpposite) {
        const d = VehiclesData[type];
        super(x, y, d.w, d.h, color, type);
        this.isOpposite = isOpposite;
        this.toRemove = false;
        this.randomSpeedFactor = 0.5 + Math.random() * 0.7;
        
        this.isKnocked = false; 
        this.knockVx = 0;
        this.knockVy = 0;
        this.spin = 0;
        this.angle = 0;
    }
    update(worldSpeed) {
        if (this.isKnocked) {
            this.x += this.knockVx;
            this.y += this.knockVy + worldSpeed; 
            this.angle += this.spin;
            if (this.x < -200 || this.x > Config.CanvasW + 200 || this.y > Config.CanvasH + 300 || this.y < -300) {
                this.toRemove = true;
            }
            return;
        }
        
        let actualEnemySpeed = Config.BaseSpeed * this.randomSpeedFactor;
        if (this.isOpposite) this.y += worldSpeed + actualEnemySpeed;
        else this.y += worldSpeed - actualEnemySpeed;
        if (this.y > Config.CanvasH + 300 || this.y < -400) this.toRemove = true;
    }
}

const Game = {
    ctx: null, player: null, enemies: [], items: [], projectiles: [], animals: [], wreckages: [], tracks: [], birds: [], keys: {}, 
    active: false, score: 0, distanceAccumulator: 0, globalOffset: 0, 
    time: 12, daysPassed: 0, animalSlowdownTimer: 0, stormDarkness: 0,
    distanceSinceLastPond: 0, distanceSinceLastAnimal: 0, lastThunderTime: 0, 
    scene: 'CITY', nextScene: null, sceneAlpha: 1.0, weather: 'CLEAR', sfx: new SoundEngine(),
    decorations: [], puddles: [], flashAlpha: 0,
    sceneDistance: 0, targetSceneDistance: 1000, scenesSinceLastBridge: 2,
    bgColors: { 'CITY': '#121212', 'SUBURB': '#2a332a', 'BEACH': '#e6d8b8', 'FOREST': '#0a2610', 'BRIDGE': '#0077be' },

    init() {
        this.ctx = document.getElementById('raceCanvas').getContext('2d', { alpha: false });

        });
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        this.loop();
    },

    confirmStart() {
        const type = document.querySelector('.vehicle-option.selected').dataset.type;
        const color = document.getElementById('carColor').value;
        let startLane = 4;
        let x = Config.SideW + startLane * Config.LaneW + (Config.LaneW - VehiclesData[type].w) / 2;
        
        this.player = new Player(x, Config.CanvasH - 200, color, type);
        this.enemies = []; this.items = []; this.projectiles = []; this.animals = []; this.wreckages = []; this.tracks = []; this.birds = [];
        this.decorations = []; this.puddles = [];
        this.score = 0; this.distanceAccumulator = 0; this.globalOffset = 0; this.animalSlowdownTimer = 0;
        this.sceneDistance = 0; this.targetSceneDistance = 1000; this.scenesSinceLastBridge = 2;
        this.time = 12; this.daysPassed = 0; this.stormDarkness = 0; this.lastThunderTime = 0;
        this.distanceSinceLastPond = 0; this.distanceSinceLastAnimal = 0;

        this.sfx.setWeatherSound(this.weather);
    },

    updateEnvironment(worldSpeed) {
        let prevTime = this.time;
        this.time = (this.time + 0.001) % 24; 
        if (this.time < prevTime) this.daysPassed++; 
        
        let hh = Math.floor(this.time).toString().padStart(2, '0');
        document.getElementById('timeTxt').innerText = `第 ${this.daysPassed + 1} 天 🕛 ${hh}:00`;

        let distAdded = worldSpeed / 10;
        this.sceneDistance += distAdded;
        this.distanceSinceLastPond += distAdded;
        this.distanceSinceLastAnimal += distAdded;

        if (this.sceneDistance >= this.targetSceneDistance && !this.nextScene) {
            let availableScenes = ['CITY', 'SUBURB', 'BEACH', 'FOREST'];
            if (this.scenesSinceLastBridge >= 2) availableScenes.push('BRIDGE');

            let newScene = availableScenes[Math.floor(Math.random() * availableScenes.length)];
            while(newScene === this.scene && availableScenes.length > 1) {
                newScene = availableScenes[Math.floor(Math.random() * availableScenes.length)];
            }
            
            this.nextScene = newScene; 
            this.sceneAlpha = 0; 
            this.sceneDistance = 0;
            this.distanceSinceLastPond = 0; 
            this.distanceSinceLastAnimal = 0;

            if (newScene === 'BRIDGE') {
                this.targetSceneDistance = 500 + Math.random() * 500;
                this.scenesSinceLastBridge = 0;
            } else {
                this.targetSceneDistance = 1000 + Math.random() * 1500;
                this.scenesSinceLastBridge++;
            }

            const weathers = ['CLEAR', 'RAIN', 'STORM', 'SNOW'];
            this.weather = weathers[Math.floor(Math.random() * 4)];
            
            this.sfx.setWeatherSound(this.weather);
            
            const sceneEmoji = {CITY:'🏙️ 城市', SUBURB:'🏡 郊區', BEACH:'🏖️ 海邊', FOREST:'🌲 森林', BRIDGE:'🌉 跨海大橋'};
            const weatherEmoji = {CLEAR:'☀️ 晴朗', RAIN:'🌧️ 下雨', STORM:'⛈️ 雷雨', SNOW:'❄️ 大雪'};
            document.getElementById('envTxt').innerText = `${sceneEmoji[this.nextScene]} | ${weatherEmoji[this.weather]}`;
        }

        if (this.nextScene) {
            this.sceneAlpha += 0.005;
            if (this.sceneAlpha >= 1) { this.scene = this.nextScene; this.nextScene = null; this.sceneAlpha = 1; }
        }

        if (this.weather === 'STORM') {
            this.stormDarkness += (0.85 - this.stormDarkness) * 0.02; 
            let now = Date.now();
            if (Math.random() < 0.008 && (now - this.lastThunderTime > 500)) { 
                this.lastThunderTime = now;
                this.flashAlpha = 1.0;

                    this.puddles.push({ x: fireX, y: -50, r: r, type: 'FIRE' });
                }
            }
        } else {
            this.stormDarkness += (0 - this.stormDarkness) * 0.02; 
        }
        if (this.flashAlpha > 0) this.flashAlpha -= 0.02;

        if ((this.weather === 'RAIN' || this.weather === 'STORM' || this.weather === 'SNOW') && Math.random() < 0.03) {
            this.puddles.push({ 
                x: Config.SideW + 30 + Math.random()*(Config.RoadW - 60), 
                y: -50, 
                r: 30 + Math.random()*40, 
                type: this.weather === 'SNOW' ? 'ICE' : 'WATER' 
            });
        }

        let currentScene = this.nextScene || this.scene;

        if (currentScene === 'CITY') {
            if (Math.random() < 0.8) {
                let isLeft = Math.random() > 0.5;
                let w = 120 + Math.random() * 60;
                let h = 250 + Math.random() * 150;
                let depthOffsets = [20, 150, 300]; 
                let depth = depthOffsets[Math.floor(Math.random() * depthOffsets.length)];
                
                let x = isLeft ? Config.SideW - depth - w/2 : Config.SideW + Config.RoadW + depth + w/2;
                
                let overlap = this.decorations.some(d => d.type === 'CITY' && Math.abs(d.x - x) < (w/2 + d.w/2) && Math.abs(d.y - (-250)) < (h/2 + d.h/2 + 20));
                if (!overlap) {
                    this.decorations.push({x: x, y: -250, type: 'CITY', w: w, h: h});
                }
            }
        } 
        else if (currentScene === 'FOREST') {
            let currentTrees = this.decorations.filter(d => d.type === 'FOREST').length;
            let maxTrees = 125; 
            
            if (currentTrees < maxTrees && Math.random() < 0.8) { 
                let count = 1 + Math.floor(Math.random() * 2);
                for(let k=0; k<count; k++) {
                    let isLeft = Math.random() > 0.5;
                    let x = isLeft ? 30 + Math.random() * (Config.SideW - 60) : Config.SideW + Config.RoadW + 30 + Math.random() * (Config.SideW - 60);
                    let y = -150 - Math.random() * 100;
                    let shape = Math.random() > 0.5 ? 'CIRCLE' : 'TRIANGLE';
                    
                    let overlap = this.decorations.some(d => 
                        d.type === 'FOREST' && Math.abs(d.x - x) < 65 && Math.abs(d.y - y) < 65
                    );

                    if (!overlap) {
                        this.decorations.push({x: x, y: y, type: 'FOREST', w: 70, h: 70, treeShape: shape});
                    }
                }
            }
            
            if (this.distanceSinceLastPond >= 100) {
                this.distanceSinceLastPond -= 100;
                if (Math.random() < 0.3) {
                    let isLeft = Math.random() > 0.5;
                    let r = 50 + Math.random() * 40; 
                    let leftMax = Config.SideW - r - 20;
                    let rightMin = Config.SideW + Config.RoadW + r + 20;
                    let x = null;
                    if (isLeft && leftMax > r) x = r + Math.random() * (leftMax - r);
                    else if (!isLeft && rightMin < Config.CanvasW - r) x = rightMin + Math.random() * (Config.CanvasW - r - rightMin);
                    
                    if (x !== null) {
                        let lilies = [];
                        let lilyCount = 3 + Math.floor(Math.random()*4);
                        for(let j=0; j<lilyCount; j++) {
                            lilies.push({ dx: (Math.random()-0.5)*r*1.2, dy: (Math.random()-0.5)*r*1.2 });
                        }
                        this.decorations.push({x, y: -150, type: 'POND', r, w: r*2, h: r*2, lilies});
                    }
                }
            }
        } 
        else if (currentScene === 'SUBURB') {
            if (Math.random() < 0.15) { 
                let isLeft = Math.random() > 0.5;
                let isFarm = Math.random() > 0.4;
                let w, h, extra = {};
                
                if (isFarm) {
                    let crops = ['#ffd700', '#ff8c00', '#32cd32', null]; 
                    w = 120 + Math.random() * 80;
                    h = 100 + Math.random() * 80;
                    extra = { cropColor: crops[Math.floor(Math.random() * 4)], hasScarecrow: Math.random() > 0.7, w, h };
                } else {
                    w = 80; h = 60;
                    extra = { w, h };
                }

                let leftMax = Config.SideW - w/2 - 20;
                let rightMin = Config.SideW + Config.RoadW + w/2 + 20;

                if (leftMax > w/2 || rightMin < Config.CanvasW - w/2) {
                    let x;
                    if (isLeft && leftMax > w/2) {
                        x = w/2 + Math.random() * (leftMax - w/2);
                    } else if (!isLeft && rightMin < Config.CanvasW - w/2) {
                        x = rightMin + Math.random() * (Config.CanvasW - w/2 - rightMin);
                    } else {
                        x = leftMax > w/2 ? (w/2 + Math.random() * (leftMax - w/2)) : (rightMin + Math.random() * (Config.CanvasW - w/2 - rightMin));
                    }

                    let overlap = this.decorations.some(d => (d.type === 'FARMLAND' || d.type === 'HOUSE') && Math.abs(d.x - x) < (w/2 + (d.w||60)/2 + 20) && Math.abs(d.y - (-250)) < (h/2 + (d.h||60)/2 + 20));
                    
                    if (!overlap && x) {
                        this.decorations.push({x: x, y: -250, type: isFarm ? 'FARMLAND' : 'HOUSE', w: w, h: h, ...extra});
                    }
                }
            }
        }
        else if (currentScene === 'BEACH' || currentScene === 'BRIDGE') {
            if (currentScene === 'BEACH') {
                if (Math.random() < 0.1) {
                    let x = Config.SideW - 100 + (Math.random() * 20 - 10);
                    let overlap = this.decorations.some(d => d.type === 'BEACH_TREE' && Math.abs(d.y - (-250)) < 150);
                    if (!overlap) {
                        this.decorations.push({x, y: -250, type: 'BEACH_TREE', w: 80, h: 120});
                    }
                }
                
                if (this.birds.length < 2 && Math.random() < 0.003) {
                    this.birds.push({
                        x: 50 + Math.random() * (Config.CanvasW - 100), 
                        y: -50, 
                        vx: (Math.random() - 0.5) * 4, 
                        vy: 2 + Math.random() * 3, 
                        wingTimer: Math.random() * 100
                    });
                }
            }
            if (Math.random() < (currentScene === 'BEACH' ? 0.005 : 0.01)) {
                let isLeft = (currentScene === 'BRIDGE') ? Math.random() > 0.5 : false;
                let w = 80, h = 120;
                let x = null;
                
                let leftMax = Config.SideW - w/2 - 20;
                let rightMin = Config.SideW + Config.RoadW + w/2 + 20;
                
                if (isLeft && leftMax > w/2) x = w/2 + Math.random() * (leftMax - w/2);
                else if (!isLeft && rightMin < Config.CanvasW - w/2) x = rightMin + Math.random() * (Config.CanvasW - w/2 - rightMin);
                
                if (x !== null) {
                    let overlap = this.decorations.some(d => d.type === 'BOAT' && Math.abs(d.x - x) < (w/2 + (d.w||80)/2 + 40) && Math.abs(d.y - (-250)) < (h/2 + (d.h||120)/2 + 40));
                    if (!overlap) this.decorations.push({x, y: -250, type: 'BOAT', w, h});
                }
            }
        }

        if (currentScene === 'FOREST' && this.distanceSinceLastAnimal >= 50) {
            this.distanceSinceLastAnimal -= 50; 
            if (Math.random() < 0.20) {
                let lane = Math.floor(Math.random() * 6);
                let x = Config.SideW + lane * Config.LaneW + Config.LaneW / 2;
                let aTypes = ['DEER', 'BEAR', 'RABBIT', 'KANGAROO'];
                this.animals.push({ x: x, y: -50, type: aTypes[Math.floor(Math.random()*4)], w: 50, h: 50, vx: (Math.random()-0.5)*2 });
            }
        }
    },

    spawnEnemy() {
        const maxEnemies = this.scene === 'CITY' ? 12 : 6;
        let rate = this.scene === 'CITY' ? 0.15 : 0.05; 
        if (Math.random() > rate) return;

        let lane = Math.floor(Math.random() * 6);
        let isOpposite = (lane < 3); 

        let isSafeToSpawn = true;
        for (let i = 0; i < this.enemies.length; i++) {
            let en = this.enemies[i];
            let enLane = Math.floor((en.x + en.w/2 - Config.SideW) / Config.LaneW);
            if (enLane === lane && en.y < 350) { isSafeToSpawn = false; break; }
        }
        if (!isSafeToSpawn) return;

        let types = Object.keys(VehiclesData);
        let type;
        if (this.scene === 'SUBURB' || this.nextScene === 'SUBURB') {
            if (Math.random() < 0.7) type = Math.random() > 0.5 ? 'bike' : 'harley';
            else type = types[Math.floor(Math.random()*types.length)];
        } else {
            type = types[Math.floor(Math.random()*types.length)];
        }

        let d = VehiclesData[type];
        let x = Config.SideW + lane * Config.LaneW + (Config.LaneW - d.w) / 2;
        let colors = ['#ffffff', '#ff3333', '#3366ff', '#ffcc00', '#33ff33', '#aaaaaa', '#ff00ff'];
        let color = colors[Math.floor(Math.random()*colors.length)];
        
        this.enemies.push(new Enemy(x, -250, type, color, isOpposite));
    },

    drawWheels(ctx, w, h) {
        ctx.fillStyle = '#050505';
        ctx.fillRect(-w/2 - 4, -h/2 + h*0.15, 6, h*0.2); ctx.fillRect(w/2 - 2, -h/2 + h*0.15, 6, h*0.2); 
        ctx.fillRect(-w/2 - 4, h/2 - h*0.35, 6, h*0.2); ctx.fillRect(w/2 - 2, h/2 - h*0.35, 6, h*0.2);  
    },

    drawVehicle(v, targetCtx) {
        let ctx = targetCtx || this.ctx;
        ctx.save();
        
        if (v === this.player && this.player.invulnTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
            ctx.globalAlpha = 0.5;
        }

        ctx.translate(v.x + v.w/2, v.y + v.h/2);
        
        let rot = 0;
        if (v.isOpposite && !targetCtx) rot += Math.PI;
        if (v.vx && !targetCtx && !v.isKnocked) rot += v.vx * 0.015;
        if (v.angle) rot += v.angle;
        if (rot !== 0) ctx.rotate(rot);

        let w = v.w, h = v.h;

        let isDMCFlying = (!targetCtx && v === this.player && this.player.type === 'delorean' && this.player.isBoosting);
        if (isDMCFlying) {
            ctx.fillStyle = '#050505';
            ctx.beginPath(); ctx.ellipse(-w/2, -h/4, 8, 4, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(w/2, -h/4, 8, 4, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(-w/2, h/4, 8, 4, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(w/2, h/4, 8, 4, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#00ffff';
            ctx.beginPath(); ctx.ellipse(-w/2, -h/4, 4, 2, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(w/2, -h/4, 4, 2, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(-w/2, h/4, 4, 2, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(w/2, h/4, 4, 2, 0, 0, Math.PI*2); ctx.fill();
        } else if (v.type !== 'bike' && v.type !== 'harley') {
             this.drawWheels(ctx, w, h);
        }

        ctx.fillStyle = v.color; 

        if (v.type === 'f1') {
            // 🚀 F1 終極細節模型重塑
            ctx.fillStyle = '#111'; ctx.fillRect(-w/2, -h/2+2, w, 12); 
            ctx.fillStyle = v.color; ctx.fillRect(-w/2, -h/2+2, 4, 16); ctx.fillRect(w/2-4, -h/2+2, 4, 16); 
            ctx.fillStyle = v.color; ctx.fillRect(-w/2+4, -h/2+4, w-8, 6); 
            
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-w/2+2, -h/4); ctx.lineTo(0, -h/2+14); ctx.lineTo(w/2-2, -h/4); ctx.stroke(); 
            ctx.fillStyle = v.color;
            ctx.beginPath(); ctx.moveTo(-6, -h/2+14); ctx.lineTo(6, -h/2+14); ctx.lineTo(12, -h/6); ctx.lineTo(-12, -h/6); ctx.fill(); 
            
            ctx.fillStyle = '#111'; ctx.fillRect(-w/2-2, -h/8, 4, h/2-10); ctx.fillRect(w/2-2, -h/8, 4, h/2-10); 
            ctx.fillStyle = '#050505'; ctx.fillRect(-w/2+2, -h/8, w-4, h/2); 
            ctx.fillStyle = v.color;
            ctx.beginPath(); ctx.moveTo(-w/2+4, -h/6); ctx.lineTo(w/2-4, -h/6); ctx.lineTo(w/2, h/3); ctx.lineTo(12, h/2-14); ctx.lineTo(-12, h/2-14); ctx.lineTo(-w/2, h/3); ctx.fill(); 
            
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.ellipse(0, -h/12, 10, 16, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(20,50,80,0.9)'; ctx.beginPath(); ctx.arc(0, -h/10, 6, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = '#00ff00'; ctx.fillRect(-4, -h/12 - 9, 8, 2); 
            
            ctx.strokeStyle = '#555'; ctx.lineWidth = 2.5; 
            ctx.beginPath(); ctx.moveTo(0, -h/10 + 6); ctx.lineTo(0, -h/10 - 8); ctx.stroke(); 
            ctx.beginPath(); ctx.arc(0, -h/10, 11, Math.PI + 0.3, -0.3); ctx.stroke(); 
            
            ctx.fillStyle = '#111'; ctx.fillRect(-w/2+2, h/2-14, w-4, 14); 
            ctx.fillStyle = v.color; ctx.fillRect(-w/2+2, h/2-16, 4, 18); ctx.fillRect(w/2-6, h/2-16, 4, 18); 
            ctx.fillRect(-w/2+6, h/2-12, w-12, 6); 
            
            ctx.fillStyle = '#888'; ctx.beginPath(); ctx.arc(0, h/2-14, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ff0000'; ctx.shadowColor = '#ff0000'; ctx.shadowBlur = (!targetCtx && (this.time > 18 || this.time < 6 || this.weather === 'STORM')) ? 10 : 0; 
            ctx.fillRect(-3, h/2-4, 6, 4); 
            ctx.shadowBlur = 0;
        } 
        else if (v.type === 'veneno') {
            // 🚀 Lamborghini Veneno 極致銳利流線模型 (完全重構)
            let w2 = w/2, h2 = h/2;
            
            // 碳纖維底盤與前擾流板
            ctx.fillStyle = '#111'; 
            ctx.beginPath(); ctx.moveTo(-w2+4, -h2); ctx.lineTo(w2-4, -h2); ctx.lineTo(w2, -h2+15); ctx.lineTo(w2, h2-5); ctx.lineTo(-w2, h2-5); ctx.lineTo(-w2, -h2+15); ctx.closePath(); ctx.fill();
            
            // 主車體流線與銳角
            ctx.fillStyle = v.color;
            ctx.beginPath(); ctx.moveTo(-w2+6, -h2+5); ctx.lineTo(w2-6, -h2+5); ctx.lineTo(w2-2, -h/4); ctx.lineTo(w2-4, h2-10); ctx.lineTo(-w2+4, h2-10); ctx.lineTo(-w2+2, -h/4); ctx.closePath(); ctx.fill();
            
            // 標誌性層次車頭
            ctx.fillStyle = '#0a0a0a';
            ctx.beginPath(); ctx.moveTo(-w/3, -h2+2); ctx.lineTo(w/3, -h2+2); ctx.lineTo(w/4, -h/3); ctx.lineTo(-w/4, -h/3); ctx.closePath(); ctx.fill();
            ctx.fillStyle = v.color;
            ctx.beginPath(); ctx.moveTo(-6, -h2+2); ctx.lineTo(6, -h2+2); ctx.lineTo(10, -h/3); ctx.lineTo(-10, -h/3); ctx.closePath(); ctx.fill();
            
            // Y 字型 LED 發光頭燈
            ctx.shadowColor = '#e0f2fe'; ctx.shadowBlur = 10;
            ctx.strokeStyle = '#e0f2fe'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(-w2+6, -h/3); ctx.lineTo(-w/4, -h/4+2); ctx.lineTo(-w/4-4, -h/6-2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(w2-6, -h/3); ctx.lineTo(w/4, -h/4+2); ctx.lineTo(w/4+4, -h/6-2); ctx.stroke();
            ctx.shadowBlur = 0;

            // 戰鬥機擋風玻璃
            ctx.fillStyle = 'rgba(10,30,40,0.95)';
            ctx.beginPath(); ctx.moveTo(0, -h/4-2); ctx.lineTo(w/4, -h/4+8); ctx.lineTo(w/3-2, h/6); ctx.lineTo(-w/3+2, h/6); ctx.lineTo(-w/4, -h/4+8); ctx.closePath(); ctx.fill();
            
            // 引擎蓋百葉窗與中央鯊魚鰭
            ctx.fillStyle = '#111';
            ctx.fillRect(-w/6, h/8, w/3, h/3.5); 
            for(let i=0; i<5; i++) ctx.fillRect(-w/6+2, h/8+4 + i*5, w/3-4, 2); 
            ctx.fillStyle = v.color; 
            ctx.fillRect(-1.5, h/10, 3, h/2.5); 

            // 巨大碳纖維尾翼
            ctx.fillStyle = '#111';
            ctx.fillRect(-w2, h2-12, w, 8); 
            ctx.fillStyle = v.color;

    drawAnimal(ctx, a) {
