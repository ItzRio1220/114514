    drawWorld(worldSpeed) {
        let ctx = this.ctx;
        
        ctx.fillStyle = this.bgColors[this.scene];
        ctx.fillRect(0, 0, Config.CanvasW, Config.CanvasH);
        
        if (this.nextScene) {
            ctx.globalAlpha = this.sceneAlpha;
            ctx.fillStyle = this.bgColors[this.nextScene];
            ctx.fillRect(0, 0, Config.CanvasW, Config.CanvasH);
            ctx.globalAlpha = 1.0;
        }

        let beachAlpha = 0, bridgeAlpha = 0;
        if (this.scene === 'BEACH') beachAlpha = this.nextScene ? 1 - this.sceneAlpha : 1;
        else if (this.nextScene === 'BEACH') beachAlpha = this.sceneAlpha;
        if (this.scene === 'BRIDGE') bridgeAlpha = this.nextScene ? 1 - this.sceneAlpha : 1;
        else if (this.nextScene === 'BRIDGE') bridgeAlpha = this.sceneAlpha;

        if (beachAlpha > 0) {
            ctx.globalAlpha = beachAlpha;
            ctx.fillStyle = '#0077be'; ctx.fillRect(Config.SideW + Config.RoadW, 0, Config.SideW, Config.CanvasH);
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillRect(Config.SideW + Config.RoadW, 0, 10, Config.CanvasH);
            ctx.globalAlpha = 1.0;
        }
        if (bridgeAlpha > 0) {
            ctx.globalAlpha = bridgeAlpha;
            ctx.fillStyle = '#0077be'; ctx.fillRect(0, 0, Config.SideW, Config.CanvasH); ctx.fillRect(Config.SideW + Config.RoadW, 0, Config.SideW, Config.CanvasH);
            ctx.globalAlpha = 1.0;
        }

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (let i = this.tracks.length - 1; i >= 0; i--) {
            let t = this.tracks[i];
            t.y1 += worldSpeed; t.y2 += worldSpeed;
            t.life--;
            if (t.life <= 0) { this.tracks.splice(i, 1); continue; }
            
            ctx.globalAlpha = t.life / 40;
            ctx.fillStyle = 'rgba(255, 100, 0, 0.9)';
            ctx.fillRect(t.x1 - 4, t.y1, 8, worldSpeed + 5); ctx.fillRect(t.x2 - 4, t.y2, 8, worldSpeed + 5);
            ctx.fillStyle = 'rgba(255, 255, 0, 1)';
            ctx.fillRect(t.x1 - 2, t.y1, 4, worldSpeed + 5); ctx.fillRect(t.x2 - 2, t.y2, 4, worldSpeed + 5);
        }
        ctx.restore();

        this.decorations.forEach((d, i) => {
            d.y += worldSpeed;
            if (d.type === 'FOREST') { 
                ctx.save();
                ctx.translate(d.x, d.y);
                ctx.fillStyle = '#5C4033'; ctx.fillRect(-6, 10, 12, 30); 
                ctx.fillStyle = '#0a4411'; 
                if (d.treeShape === 'CIRCLE') {
                    ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = '#115a1a'; ctx.beginPath(); ctx.arc(5, -5, 25, 0, Math.PI*2); ctx.fill(); 
                } else {
                    ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(-30, 20); ctx.lineTo(30, 20); ctx.fill();
                    ctx.fillStyle = '#115a1a'; ctx.beginPath(); ctx.moveTo(5, -30); ctx.lineTo(-15, 15); ctx.lineTo(25, 15); ctx.fill();
                }
                ctx.restore();
            }
            else if (d.type === 'CITY') { 
                ctx.fillStyle = '#111'; ctx.fillRect(d.x - d.w/2, d.y - d.h, d.w, d.h); 
                ctx.fillStyle = '#1a1a1a'; ctx.fillRect(d.x - d.w/2 + 10, d.y - d.h - 40, d.w - 20, d.h + 40); 
                ctx.fillStyle = 'rgba(255,255,100,0.85)';
                for(let wx = d.x - d.w/2 + 15; wx <= d.x + d.w/2 - 15; wx += 20) {
                    for(let wy = d.y - d.h + 10; wy < d.y - 10; wy += 25) {
                        if(Math.random() > 0.4) ctx.fillRect(wx, wy, 12, 16); 
                    }
                }
            }
            else if (d.type === 'FARMLAND') { 
                ctx.fillStyle = '#5c4033'; ctx.fillRect(d.x - d.w/2, d.y - d.h/2, d.w, d.h); 
                if (d.cropColor) {
                    ctx.fillStyle = d.cropColor;
                    for(let cx = d.x - d.w/2 + 10; cx < d.x + d.w/2 - 10; cx += 15) {
                        for(let cy = d.y - d.h/2 + 10; cy < d.y + d.h/2 - 10; cy += 15) {
                            ctx.fillRect(cx, cy, 8, 8); 
                        }
                    }
                }
                if (d.hasScarecrow) { 
                    ctx.fillStyle = '#8B4513'; ctx.fillRect(d.x-2, d.y-15, 4, 30); 
                    ctx.fillStyle = '#333'; ctx.fillRect(d.x-15, d.y-5, 30, 4); 
                    ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(d.x, d.y-15, 8, 0, Math.PI*2); ctx.fill(); 
                }
            } else if (d.type === 'HOUSE') {
                ctx.fillStyle = '#f5f5dc'; ctx.fillRect(d.x - d.w/2, d.y - d.h/2, d.w, d.h); 
                ctx.fillStyle = '#8b0000'; ctx.beginPath(); ctx.moveTo(d.x - d.w/2 - 5, d.y - d.h/2); ctx.lineTo(d.x + d.w/2 + 5, d.y - d.h/2); ctx.lineTo(d.x, d.y - d.h/2 - 25); ctx.fill();
                ctx.fillStyle = '#87CEEB'; ctx.fillRect(d.x - 15, d.y - d.h/2 + 15, 12, 12); ctx.fillRect(d.x + 5, d.y - d.h/2 + 15, 12, 12); 
            }
            else if (d.type === 'BEACH_TREE') {
                ctx.save();
                ctx.translate(d.x, d.y);
                ctx.fillStyle = '#D2A679'; ctx.beginPath(); ctx.moveTo(-4, -60); ctx.quadraticCurveTo(-15, -10, -4, 40); ctx.lineTo(6, 40); ctx.quadraticCurveTo(-5, -10, 6, -60); ctx.fill();
                ctx.fillStyle = '#4ade80'; let leafCount = 6;
                for (let j = 0; j < leafCount; j++) {
                    let angle = (j * Math.PI * 2) / leafCount;
                    ctx.save(); ctx.translate(0, -60); ctx.rotate(angle);
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(20, -15, 35, 0); ctx.quadraticCurveTo(20, 15, 0, 0); ctx.fill();
                    ctx.restore();
                }
                ctx.fillStyle = '#78350f'; ctx.beginPath(); ctx.arc(-6, -55, 4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(6, -55, 4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(0, -50, 4, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
            else if (d.type === 'BOAT') {
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(d.x, d.y, 40, 0, Math.PI); ctx.fill(); 
                ctx.fillStyle = '#dddddd'; ctx.fillRect(d.x - 3, d.y - 70, 6, 70); 
                ctx.fillStyle = '#ff3333'; ctx.beginPath(); ctx.moveTo(d.x + 3, d.y - 10); ctx.lineTo(d.x + 45, d.y - 40); ctx.lineTo(d.x + 3, d.y - 65); ctx.fill(); 
            } else if (d.type === 'POND') {
                let grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r);
                grad.addColorStop(0, '#00CED1'); grad.addColorStop(1, '#008B8B');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = '#228B22';
                d.lilies.forEach(l => {
                    ctx.beginPath(); ctx.arc(d.x + l.dx, d.y + l.dy, 8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#008B8B';
                    ctx.beginPath(); ctx.moveTo(d.x + l.dx, d.y + l.dy); ctx.arc(d.x + l.dx, d.y + l.dy, 9, 0, 0.5); ctx.fill();
                    ctx.fillStyle = '#228B22';
                });
            }
            if (d.y > Config.CanvasH + 300) this.decorations.splice(i, 1);
        });

        let sw = 45;
        ctx.fillStyle = '#555';
        ctx.fillRect(Config.SideW - sw, 0, sw, Config.CanvasH); ctx.fillRect(Config.SideW + Config.RoadW, 0, sw, Config.CanvasH);
        ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
        let sideOffset = this.globalOffset % 40;
        for(let y = -100; y < Config.CanvasH + 100; y += 40) {
            let actualY = y + sideOffset;
            ctx.beginPath(); ctx.moveTo(Config.SideW - sw, actualY); ctx.lineTo(Config.SideW, actualY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(Config.SideW + Config.RoadW, actualY); ctx.lineTo(Config.SideW + Config.RoadW + sw, actualY); ctx.stroke();
        }

        ctx.fillStyle = '#222';
        ctx.fillRect(Config.SideW, 0, Config.RoadW, Config.CanvasH);
        
        let stripLen = 40;
        let rOffset = this.globalOffset % (stripLen * 2);
        for(let y = -stripLen; y < Config.CanvasH; y += stripLen) {
            ctx.fillStyle = Math.floor((y + rOffset) / stripLen) % 2 === 0 ? '#cc0000' : '#ffffff';
            ctx.fillRect(Config.SideW - 8, y, 8, stripLen);
            ctx.fillRect(Config.SideW + Config.RoadW, y, 8, stripLen);
        }

        ctx.lineDashOffset = -this.globalOffset;
        for (let i = 1; i < 6; i++) {
            ctx.beginPath(); ctx.moveTo(Config.SideW + i * Config.LaneW, 0); ctx.lineTo(Config.SideW + i * Config.LaneW, Config.CanvasH);
            if (i === 3) { ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 4; ctx.setLineDash([]); ctx.stroke(); } 
            else { ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2; ctx.setLineDash([30, 40]); ctx.stroke(); }
        }

        this.puddles.forEach((p, i) => {
            p.y += worldSpeed;
            if (p.type === 'FIRE') {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                let glowR = p.r * (3 + Math.random() * 0.5); 
                let fireGlow = ctx.createRadialGradient(p.x, p.y, p.r * 0.5, p.x, p.y, glowR);
                fireGlow.addColorStop(0, 'rgba(255, 100, 0, 0.3)'); 
                fireGlow.addColorStop(0.5, 'rgba(255, 50, 0, 0.1)'); 
                fireGlow.addColorStop(1, 'rgba(255, 0, 0, 0)'); 
                ctx.fillStyle = fireGlow;
                ctx.beginPath(); ctx.arc(p.x, p.y, glowR, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                let r = p.r + Math.random()*5;
                ctx.fillStyle = 'rgba(255, 50, 0, 0.8)';
                ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255, 150, 0, 0.9)';
                ctx.beginPath(); ctx.arc(p.x, p.y, r*0.6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 0, 1)';
                ctx.beginPath(); ctx.arc(p.x, p.y, r*0.3, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.beginPath(); if (ctx.ellipse) ctx.ellipse(p.x, p.y, p.r, p.r/2, 0, 0, 7); else ctx.arc(p.x, p.y, p.r, 0, 7);
                ctx.fillStyle = p.type === 'ICE' ? 'rgba(220, 250, 255, 0.8)' : 'rgba(0, 150, 255, 0.4)';
                ctx.fill();
                if (p.type === 'ICE') {
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.beginPath(); if(ctx.ellipse) ctx.ellipse(p.x-p.r*0.3, p.y-p.r*0.1, p.r*0.4, p.r*0.1, 0, 0, 7); else ctx.arc(p.x-p.r*0.3, p.y-p.r*0.1, p.r*0.2, 0, 7);
                    ctx.fill();
                }
            }
            if (p.y > Config.CanvasH + 100) this.puddles.splice(i, 1);
        });

        let lampSpacing = 800;
        let lOffset = this.globalOffset % lampSpacing;
        for(let y = -lampSpacing; y < Config.CanvasH + lampSpacing; y += lampSpacing) {
            let actualY = y + lOffset;
            
            // 左側路燈
            ctx.save();
            ctx.translate(Config.SideW - 10, actualY);
            ctx.fillStyle = '#333'; ctx.fillRect(-6, -10, 12, 10); 
            ctx.fillStyle = '#444'; ctx.fillRect(-3, -100, 6, 100); 
            ctx.fillStyle = '#555'; ctx.fillRect(-3, -100, 50, 5); 
            ctx.shadowColor = '#fff59d'; ctx.shadowBlur = 15;
            ctx.fillStyle = '#fff9c4'; ctx.beginPath(); ctx.arc(42, -97, 4, 0, Math.PI*2); ctx.fill(); 
            ctx.shadowBlur = 30; ctx.fillStyle = 'rgba(255, 245, 157, 0.4)'; ctx.beginPath(); ctx.arc(42, -97, 12, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            
            // 右側路燈
            ctx.save();
            ctx.translate(Config.SideW + Config.RoadW + 10, actualY);
            ctx.fillStyle = '#333'; ctx.fillRect(-6, -10, 12, 10); 
            ctx.fillStyle = '#444'; ctx.fillRect(-3, -100, 6, 100); 
            ctx.fillStyle = '#555'; ctx.fillRect(-47, -100, 50, 5); 
            ctx.shadowColor = '#fff59d'; ctx.shadowBlur = 15;
            ctx.fillStyle = '#fff9c4'; ctx.beginPath(); ctx.arc(-42, -97, 4, 0, Math.PI*2); ctx.fill(); 
            ctx.shadowBlur = 30; ctx.fillStyle = 'rgba(255, 245, 157, 0.4)'; ctx.beginPath(); ctx.arc(-42, -97, 12, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        for (let i = this.wreckages.length - 1; i >= 0; i--) {
            let w = this.wreckages[i];
            w.y += worldSpeed;
            
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.moveTo(w.x, w.y + 10); ctx.lineTo(w.x + w.w/2, w.y - 10); ctx.lineTo(w.x + w.w, w.y + 15);
            ctx.lineTo(w.x + w.w - 10, w.y + w.h + 10); ctx.lineTo(w.x + 10, w.y + w.h); ctx.fill();
            
            let t = Date.now() / 150;
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = 'rgba(255, 60, 0, 0.7)';
            ctx.beginPath(); ctx.arc(w.x + w.w/2, w.y + w.h/2 + Math.sin(t)*5, 18 + Math.random()*5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255, 200, 0, 0.9)';
            ctx.beginPath(); ctx.arc(w.x + w.w/2, w.y + w.h/2 + Math.cos(t)*3, 10 + Math.random()*3, 0, Math.PI*2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            let isFlying = (this.player.type === 'delorean' && this.player.isBoosting);
            if (!isFlying && this.player.invulnTimer <= 0 && this.player.x < w.x + w.w && this.player.x + this.player.w > w.x && this.player.y < w.y + w.h && this.player.y + this.player.h > w.y) {
                this.sfx.playCrash();
                if (this.player.ultimateNitroTimer <= 0) {
                    if (this.player.extraHp > 0) this.player.extraHp--; else this.player.hp -= 0.5; 
                    this.player.invulnTimer = 60; 
                    if (this.player.hp <= 0) {
                        this.active = false;
                        alert(`【玩命關頭】撞上殘骸！\n你存活了 ${this.daysPassed + 1} 天\n總行駛里程: ${Math.floor(this.score)} 公尺`);
                        location.reload();
                    }
                }
                this.wreckages.splice(i, 1);
            } else if (w.y > Config.CanvasH + 100) {
                this.wreckages.splice(i, 1);
            }
        }

        for (let i = this.animals.length - 1; i >= 0; i--) {
            let a = this.animals[i];
            a.y += worldSpeed; a.x += a.vx;
            this.drawAnimal(ctx, a);
            
            let isFlying = (this.player.type === 'delorean' && this.player.isBoosting);
            if (!isFlying && this.player.x < a.x + a.w/2 && this.player.x + this.player.w > a.x - a.w/2 && this.player.y < a.y + a.h/2 && this.player.y + this.player.h > a.y - a.h/2) {
                this.animalSlowdownTimer = 60; this.sfx.playAnimalHit(); this.animals.splice(i, 1);
            } else if (a.y > Config.CanvasH + 100) {
                this.animals.splice(i, 1);
            }
        }
    },

    drawForeground() {
        let bridgeAlpha = 0;
        if (this.scene === 'BRIDGE') bridgeAlpha = this.nextScene ? 1 - this.sceneAlpha : 1;
        else if (this.nextScene === 'BRIDGE') bridgeAlpha = this.sceneAlpha;

        if (bridgeAlpha > 0) {
            let ctx = this.ctx;
            ctx.globalAlpha = bridgeAlpha;
            let beamSpacing = 400;
            let bOffset = this.globalOffset % beamSpacing;
            
            for(let y = -beamSpacing; y < Config.CanvasH + beamSpacing; y += beamSpacing) {
                let actualY = y + bOffset;
                ctx.strokeStyle = 'rgba(50,50,50,0.85)'; ctx.lineWidth = 15;
                ctx.beginPath(); ctx.moveTo(Config.SideW, actualY); ctx.lineTo(Config.SideW + Config.RoadW, actualY + beamSpacing); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(Config.SideW + Config.RoadW, actualY); ctx.lineTo(Config.SideW, actualY + beamSpacing); ctx.stroke();
                ctx.fillStyle = '#444'; ctx.fillRect(Config.SideW - 10, actualY, Config.RoadW + 20, 30);
                ctx.fillStyle = '#222'; ctx.fillRect(Config.SideW - 10, actualY + 25, Config.RoadW + 20, 5);
            }
            ctx.globalAlpha = 1.0;
        }
    },

    drawLightCone(ctx, v, length, isPlayer) {
        let px = v.x + v.w / 2;
        let dir = v.isOpposite ? 1 : -1;
        let py = v.isOpposite ? v.y + v.h + 2 : v.y - 2; 
        
        if (isFinite(px) && isFinite(py)) {
            let grad = ctx.createRadialGradient(px, py, 5, px, py, length);
            grad.addColorStop(0, "rgba(255, 255, 255, 0.95)"); grad.addColorStop(0.3, "rgba(255, 255, 200, 0.4)"); grad.addColorStop(1, "rgba(255, 255, 200, 0)");
            
            ctx.fillStyle = grad;
            let angleBase = v.isOpposite ? Math.PI/2 : -Math.PI/2;
            let spread = isPlayer ? 0.6 : 0.45; 
            
            ctx.beginPath(); ctx.moveTo(px, py); ctx.arc(px, py, length, angleBase - spread, angleBase + spread); ctx.closePath(); ctx.fill();

            let coreGrad = ctx.createRadialGradient(px, py, 0, px, py, length * 0.4);
            coreGrad.addColorStop(0, "rgba(255, 255, 255, 0.8)"); coreGrad.addColorStop(1, "rgba(255, 255, 255, 0)");
            ctx.fillStyle = coreGrad;
            ctx.beginPath(); ctx.moveTo(px, py); ctx.arc(px, py, length * 0.4, angleBase - spread * 0.5, angleBase + spread * 0.5); ctx.closePath(); ctx.fill();
        }
    },

    drawOverlays() {
        let ctx = this.ctx;
        if (!this.player || !isFinite(this.player.x) || !isFinite(this.player.y)) return;

        let nightAlpha = 0;
        if (this.time > 18) nightAlpha = (this.time - 18) / 6 * 0.8;
        if (this.time < 6) nightAlpha = (6 - this.time) / 6 * 0.8;
        nightAlpha = Math.max(nightAlpha, this.stormDarkness);
        nightAlpha = Math.max(0, nightAlpha - this.flashAlpha);

        if (nightAlpha > 0) {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(0,0,10,${nightAlpha})`; ctx.fillRect(0, 0, Config.CanvasW, Config.CanvasH);

            if (nightAlpha > 0.3) {
                ctx.globalCompositeOperation = 'lighter';
                
                this.drawLightCone(ctx, this.player, 500, true);
                this.enemies.forEach(en => { this.drawLightCone(ctx, en, 250, false); });

                let lampSpacing = 800;
                let lOffset = this.globalOffset % lampSpacing;
                for(let y = -lampSpacing; y < Config.CanvasH + lampSpacing; y += lampSpacing) {
                    let actualY = y + lOffset;
                    
                    let lx = Config.SideW + 32, ly = actualY; 
                    let gradL = ctx.createRadialGradient(lx, ly, 10, lx, ly, 250);
                    gradL.addColorStop(0, "rgba(255, 245, 150, 0.5)"); gradL.addColorStop(1, "rgba(255, 245, 150, 0)");
                    ctx.fillStyle = gradL; ctx.beginPath(); ctx.arc(lx, ly, 250, 0, Math.PI*2); ctx.fill();

                    let rx = Config.SideW + Config.RoadW - 32, ry = actualY;
                    let gradR = ctx.createRadialGradient(rx, ry, 10, rx, ry, 250);
                    gradR.addColorStop(0, "rgba(255, 245, 150, 0.5)"); gradR.addColorStop(1, "rgba(255, 245, 150, 0)");
                    ctx.fillStyle = gradR; ctx.beginPath(); ctx.arc(rx, ry, 250, 0, Math.PI*2); ctx.fill();
                }
                ctx.globalCompositeOperation = 'source-over';
            }
        }

        if (this.weather === 'RAIN' || this.weather === 'STORM') {
            ctx.strokeStyle = 'rgba(200,220,255,0.6)'; ctx.lineWidth = 2;
            ctx.beginPath();
            for(let i=0; i<100; i++) {
                let x = Math.random()*Config.CanvasW, y = Math.random()*Config.CanvasH;
                ctx.moveTo(x, y); ctx.lineTo(x-10, y+40); 
            }
            ctx.stroke();
        } else if (this.weather === 'SNOW') {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; ctx.fillRect(0, 0, Config.CanvasW, Config.CanvasH);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            for(let i=0; i<300; i++) { 
                let sz = 3 + Math.random()*4; 
                ctx.fillRect(Math.random()*Config.CanvasW, Math.random()*Config.CanvasH, sz, sz); 
            }
        }
        
        if (this.player.isBoosting && this.active && this.player.type !== 'delorean') {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            let px = this.player.x + this.player.w / 2;
            let py = this.player.y + this.player.h;
            let offsets = [-10, 10];
            if (this.player.type === 'f1' || this.player.type === 'bike') offsets = [0];
            else if (this.player.type === 'harley') offsets = [-4, 4];
            else if (this.player.type === 'veneno' || this.player.type === 'gtr') offsets = [-12, 12];
            
            offsets.forEach(off => {
                let grad = ctx.createRadialGradient(px + off, py, 2, px + off, py + 30, 15);
                grad.addColorStop(0, 'rgba(255,255,255,1)');
                grad.addColorStop(0.3, 'rgba(0,255,255,0.8)');
                grad.addColorStop(1, 'rgba(0,100,255,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(px + off - 6, py);
                ctx.lineTo(px + off + 6, py);
                ctx.lineTo(px + off, py + 40 + Math.random()*20);
                ctx.fill();
            });
            ctx.restore();
        }
    },

    loop() {
        if (this.active) {
            let ctx = this.ctx; 

            let speedMultiplier = 1 + (this.daysPassed * 0.1);
            if (this.animalSlowdownTimer > 0) {
                this.animalSlowdownTimer--;
                speedMultiplier *= 0.4; 
            }

            let worldSpeed = (Config.BaseSpeed * speedMultiplier) + (this.keys.Space && this.player.nitro > 0 && this.player.ultimateNitroTimer <= 0 ? 6 : 0);
            
            if (this.player.ultimateNitroTimer > 0) {
                this.player.ultimateNitroTimer -= 1/60; 
                worldSpeed = Config.BaseSpeed * 10 * speedMultiplier; 
            }

            this.globalOffset += worldSpeed;

            this.updateEnvironment(worldSpeed);
            
            let isNitro = this.player.update(this.keys, this.weather);
            let isFlying = (this.player.type === 'delorean' && this.player.isBoosting);
            
            if (this.player.type === 'delorean' && this.player.isBoosting) {
                this.tracks.push({
                    x1: this.player.x + 6, y1: this.player.y + this.player.h - 5,
                    x2: this.player.x + this.player.w - 6, y2: this.player.y + this.player.h - 5,
                    life: 40 
                });
            }
            
            if (!isFlying) {
                this.puddles.forEach(p => {
                    let dx = this.player.x + this.player.w/2 - p.x;
                    let dy = (this.player.y + this.player.h/2 - p.y) * 2; 
                    if (dx * dx + dy * dy < (p.r + 10) * (p.r + 10)) {
                        if (p.type === 'FIRE') {
                            if (this.player.ultimateNitroTimer <= 0 && this.player.isBurning <= 0 && this.player.invulnTimer <= 0) {
                                this.sfx.playCrash();
                                if (this.player.extraHp > 0) this.player.extraHp--; else this.player.hp -= 0.5; 
                                this.player.isBurning = 60;
                                this.player.invulnTimer = 60; 
                                if (this.player.hp <= 0) {
                                    this.active = false;
                                    alert(`【玩命關頭】被落雷烈火燒毀！\n你存活了 ${this.daysPassed + 1} 天\n總行駛里程: ${Math.floor(this.score)} 公尺`);
                                    location.reload();
                                }
                            }
                        } else {
                            let slipForce = p.type === 'ICE' ? 3 : 1; 
                            this.player.vx += (Math.random() - 0.5) * slipForce;
                        }
                    }
                });
            }

            this.drawWorld(worldSpeed);
            
            this.distanceAccumulator += worldSpeed / 10;
            if (this.distanceAccumulator >= 300) {
                this.distanceAccumulator -= 300;
                if (this.items.length === 0 && this.player.ultimateNitroTimer <= 0) {
                    let availableItems = ['shield', 'nitro', 'rocket'];
                    if (this.player.hp < VehiclesData[this.player.type].hp) {
                        availableItems.push('repair');
                    }
                    
                    let r = Math.random();
                    let type = null;
                    let baseChancePerItem = 0.15; 
                    
                    if (r < availableItems.length * baseChancePerItem) {
                        let index = Math.floor(r / baseChancePerItem);
                        type = availableItems[index];
                    }

                    if (type) {
                        let lane = Math.floor(Math.random() * 6);
                        let x = Config.SideW + lane * Config.LaneW + (Config.LaneW - 40) / 2;
                        this.items.push(new Item(x, -100, type));
                    }
                }
            }
            
            this.sfx.updateEngine(1 + worldSpeed/20, isNitro);

            this.spawnEnemy();

            // 敵方之間互撞邏輯
            for (let i = 0; i < this.enemies.length; i++) {
                let e1 = this.enemies[i];
                if (e1.toRemove || e1.isKnocked) continue;
                
                let inFire = this.puddles.some(p => p.type === 'FIRE' && Math.abs(e1.x + e1.w/2 - p.x) < p.r && Math.abs(e1.y + e1.h/2 - p.y) < p.r);
                if (inFire) {
                    this.wreckages.push({ x: e1.x, y: e1.y, w: e1.w, h: e1.h });
                    this.sfx.playCrash(); e1.toRemove = true; continue;
                }

                for (let j = i + 1; j < this.enemies.length; j++) {
                    let e2 = this.enemies[j];
                    if (!e2.toRemove && !e2.isKnocked && e1.x < e2.x + e2.w && e1.x + e1.w > e2.x && e1.y < e2.y + e2.h && e1.y + e1.h > e2.y) {
                        this.wreckages.push({
                            x: Math.min(e1.x, e2.x), y: Math.min(e1.y, e2.y), 
                            w: Math.max(e1.x+e1.w, e2.x+e2.w) - Math.min(e1.x, e2.x),
                            h: Math.max(e1.y+e1.h, e2.y+e2.h) - Math.min(e1.y, e2.y)
                        });
                        this.sfx.playCrash();
                        e1.toRemove = true; e2.toRemove = true;
                    }
                }
            }

            for (let i = this.items.length - 1; i >= 0; i--) {
                let item = this.items[i];
                item.y += worldSpeed;
                item.draw(this.ctx);
                
                if (this.player.x < item.x + item.w && this.player.x + this.player.w > item.x &&
                    this.player.y < item.y + item.h && this.player.y + this.player.h > item.y) {
                    
                    if (item.type === 'shield') this.player.extraHp = 1; 
                    else if (item.type === 'nitro') this.player.ultimateNitroTimer = 5; 
                    else if (item.type === 'rocket') this.player.rocketAmmo = 3; 
                    else if (item.type === 'repair') { 
                        this.sfx.playRepairSFX();
                        this.player.hp += 0.5; 
                        let maxHp = VehiclesData[this.player.type].hp;
                        if (this.player.hp > maxHp) this.player.hp = maxHp; 
                    }
                    
                    this.items.splice(i, 1);
                } else if (item.y > Config.CanvasH + 100) {
                    this.items.splice(i, 1);
                }
            }

            for (let i = this.projectiles.length - 1; i >= 0; i--) {
                let p = this.projectiles[i];
                p.y += p.vy;
                
                ctx.fillStyle = '#ff3300'; ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#ffaa00'; ctx.fillRect(p.x + 2, p.y + p.h, p.w - 4, 15); 
                
                let hit = false;
                for (let j = this.enemies.length - 1; j >= 0; j--) {
                    let en = this.enemies[j];
                    if (!en.toRemove && !en.isKnocked && p.x < en.x + en.w && p.x + p.w > en.x && p.y < en.y + en.h && p.y + p.h > en.y) {
                        en.toRemove = true; hit = true; this.sfx.playCrash(); break;
                    }
                }
                if (hit || p.y < -100) this.projectiles.splice(i, 1);
            }

            for (let i = this.enemies.length - 1; i >= 0; i--) {
                let en = this.enemies[i];
                en.update(worldSpeed);
                if (en.toRemove) { this.enemies.splice(i, 1); continue; }
                this.drawVehicle(en);

                let marginX = 5, marginY = 5;
                if (!isFlying && !en.isKnocked && this.player.x + marginX < en.x + en.w - marginX && 
                    this.player.x + this.player.w - marginX > en.x + marginX && 
                    this.player.y + marginY < en.y + en.h - marginY && 
                    this.player.y + this.player.h - marginY > en.y + marginY) {
                    
                    let isHeavyRam = false;
                    let isBounced = false;

                    if (this.player.isBoosting || this.player.ultimateNitroTimer > 0) {
                        if (this.player.type === 'truck') {
                            isHeavyRam = true;
                        } else if (this.player.type === 'van') {
                            if (en.type === 'truck') {
                                isBounced = true; 
                            } else {
                                isHeavyRam = true;
                            }
                        } else if (this.player.ultimateNitroTimer > 0) {
                            isHeavyRam = true;
                        }
                    }

                    if (isHeavyRam) {
                        this.sfx.playCrash(); 
                        en.isKnocked = true; 
                        en.knockVx = (en.x + en.w/2 > this.player.x + this.player.w/2) ? 20 : -20;
                        en.knockVy = -15;
                        en.spin = (Math.random() - 0.5) * 0.8; 
                    } else if (this.player.invulnTimer <= 0) { 
                        if (isBounced) {
                            this.sfx.playCrash();
                            this.player.vx = (this.player.x + this.player.w/2 < en.x + en.w/2) ? -15 : 15;
                            this.player.vy = 8;
                            if (this.player.extraHp > 0) this.player.extraHp--; else this.player.hp -= 0.5; 
                            this.player.invulnTimer = 60; 
                            
                            if (this.player.hp <= 0) {
                                this.active = false;
                                alert(`【玩命關頭】碰撞！\n你存活了 ${this.daysPassed + 1} 天\n總行駛里程: ${Math.floor(this.score)} 公尺`);
                                location.reload();
                            }
                        } else {
                            this.sfx.playCrash();
                            if (this.player.extraHp > 0) this.player.extraHp--; else this.player.hp -= 0.5; 
                            this.player.invulnTimer = 60; 
                            this.enemies.splice(i, 1);
                            
                            if (this.player.hp <= 0) {
                                this.active = false;
                                alert(`【玩命關頭】碰撞！\n你存活了 ${this.daysPassed + 1} 天\n總行駛里程: ${Math.floor(this.score)} 公尺`);
                                location.reload();
                            }
                        }
                    }
                }
            }

            this.drawVehicle(this.player);
            this.drawForeground(); 
            
            for (let i = this.birds.length - 1; i >= 0; i--) {
                let b = this.birds[i];
                b.x += b.vx;
                b.y += b.vy; 
                b.wingTimer += 0.15; 
                
                if (b.y > Config.CanvasH + 100 || b.x < -100 || b.x > Config.CanvasW + 100 || b.y < -300) {
                    this.birds.splice(i, 1);
                    continue;
                }
                
                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.rotate(Math.atan2(b.vy, b.vx) + Math.PI/2);
                
                let wingY = Math.sin(b.wingTimer) * 8; 
                
                ctx.fillStyle = '#f0f0f0';
                ctx.beginPath();
                ctx.moveTo(0, -10); 
                ctx.lineTo(3, -2); 
                ctx.quadraticCurveTo(20, wingY - 5, 28, wingY); 
                ctx.quadraticCurveTo(15, wingY + 3, 2, 6); 
                ctx.lineTo(0, 15); 
                ctx.lineTo(-2, 6); 
                ctx.quadraticCurveTo(-15, wingY + 3, -28, wingY); 
                ctx.quadraticCurveTo(-20, wingY - 5, -3, -2); 
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#222';
                ctx.beginPath(); ctx.moveTo(22, wingY - 1); ctx.lineTo(28, wingY); ctx.lineTo(18, wingY + 4); ctx.fill();
                ctx.beginPath(); ctx.moveTo(-22, wingY - 1); ctx.lineTo(-28, wingY); ctx.lineTo(-18, wingY + 4); ctx.fill();
                ctx.restore();
            }

            this.drawOverlays();

            this.score += worldSpeed / 10;
            document.getElementById('scoreTxt').innerText = Math.floor(this.score);
        }
        requestAnimationFrame(() => this.loop());
    }
};

function updatePreview() {
    let canvas = document.getElementById('previewCanvas');
    let ctx = canvas.getContext('2d');
    let opt = document.querySelector('.vehicle-option.selected');
    if (!opt) return;
    let type = opt.dataset.type;
    let color = document.getElementById('carColor').value;
    let d = VehiclesData[type];
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
    for(let i=0; i<500; i+=20) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,250); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(500,i); ctx.stroke();
    }

    let v = { x: -d.w/2, y: -d.h/2, w: d.w, h: d.h, color: color, type: type, vx: 0, isOpposite: false };
    
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(2.2, 2.2); 
    Game.drawVehicle(v, ctx); 
    ctx.restore();
}

window.onload = () => {
    updatePreview(); 
};

const savedBgmVol = localStorage.getItem('bgmVolume') !== null ? localStorage.getItem('bgmVolume') : 0.4;
const savedSfxVol = localStorage.getItem('sfxVolume') !== null ? localStorage.getItem('sfxVolume') : 0.6;
const savedWeatherVol = localStorage.getItem('weatherVolume') !== null ? localStorage.getItem('weatherVolume') : 0.5;

document.getElementById('bgmVolume').value = savedBgmVol;
document.getElementById('sfxVolume').value = savedSfxVol;
document.getElementById('weatherVolume').value = savedWeatherVol;

const musicSelect = document.getElementById('musicSelect');

musicSelect.addEventListener('change', (e) => {
    bgMusic.src = e.target.value;
    
    bgMusic.play().catch(err => console.log("切換音樂等待中:", err));
});

const bgMusic = document.getElementById('bgMusic');
bgMusic.volume = savedBgmVol; 

document.getElementById('bgmVolume').addEventListener('input', (e) => {
    const val = e.target.value;
    bgMusic.volume = val;
    localStorage.setItem('bgmVolume', val);
});

document.getElementById('sfxVolume').addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    if (Game.sfx) Game.sfx.sfxVol = val;
    localStorage.setItem('sfxVolume', val);
});

document.getElementById('weatherVolume').addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    if (Game.sfx) Game.sfx.setWeatherVolume(val);
    localStorage.setItem('weatherVolume', val);
});

document.getElementById('clickToStart').onclick = () => {
    document.getElementById('clickToStart').style.display = 'none';
    document.getElementById('startScreen').style.display = 'block';
    
    // 1. 初始化遊戲與音效引擎
    Game.init(); 
    Game.sfx.init();
    
    // 2. 套用音效與天氣的音量設定
    Game.sfx.sfxVol = parseFloat(document.getElementById('sfxVolume').value);
    Game.sfx.setWeatherVolume(parseFloat(document.getElementById('weatherVolume').value));
    
    // 3. 抓取下拉選單選中的音樂網址
    bgMusic.src = document.getElementById('musicSelect').value; 
    
    // 4. 設定背景音樂音量並開始播放
    bgMusic.volume = document.getElementById('bgmVolume').value;
    bgMusic.play().catch(err => console.log("音樂播放等待中:", err));
};

document.querySelectorAll('.vehicle-option').forEach(opt => {
    opt.onclick = () => {
        document.querySelectorAll('.vehicle-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        updatePreview();
    };
});

document.getElementById('carColor').addEventListener('input', updatePreview);
</script>
