<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>玩命關頭</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #gameContainer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .ui-panel { position: absolute; background: rgba(10, 10, 15, 0.95); padding: 30px; border-radius: 20px; border: 1px solid #333; z-index: 100; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 750px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .ui-panel h2 { text-align: center; color: #ff2222; margin-top: 0; letter-spacing: 2px; }
        .controls-info { text-align: center; font-size: 13px; color: #888; margin-bottom: 20px; }
        
        .ui-layout { display: flex; gap: 20px; align-items: stretch; }
        
        .ui-left { flex: 0 0 320px; display: flex; flex-direction: column; justify-content: space-between; }
        
        .vehicle-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 0; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .vehicle-grid::-webkit-scrollbar { width: 6px; }
        .vehicle-grid::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .vehicle-grid::-webkit-scrollbar-thumb:hover { background: #00d2ff; }
        
        .vehicle-option { background: #1a1a1a; border: 2px solid #444; padding: 12px 8px; cursor: pointer; border-radius: 12px; font-size: 12px; transition: 0.2s; text-align: center; }
        .vehicle-option:hover { background: #2a2a2a; border-color: #00d2ff; transform: translateY(-2px); }
        .vehicle-option.selected { border-color: #00ff88; background: #112a1d; box-shadow: 0 0 15px rgba(0,255,136,0.3); }
        .vehicle-option b { display: block; font-size: 15px; margin-bottom: 4px; color: #fff; }
        .vehicle-option span { font-size: 11px; color: #aaa; }
        
        .ui-right { flex: 1; display: flex; flex-direction: column; }
        #previewContainer { flex: 1; min-height: 250px; width: 100%; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, rgba(40,40,60,1) 0%, rgba(10,10,15,1) 100%); border-radius: 15px; border: 1px solid #444; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); margin-bottom: 15px; }
        
        .color-picker-container { margin-bottom: 10px; }
        .color-picker-container label { font-size: 13px; color: #aaa; margin-bottom: 5px; display: block; }
        #carColor { width: 100%; height: 45px; border: none; background: none; cursor: pointer; }
        
        .start-btn { background: linear-gradient(135deg, #ff2222 0%, #a30000 100%); color: white; border: none; padding: 16px; font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 15px; letter-spacing: 3px; transition: 0.3s; }
        .start-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(255,50,50,0.5); }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 50; }
        .hud-box { position: absolute; background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px); }
        .nitro-bar { width: 200px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        #nitroFill { width: 100%; height: 100%; background: linear-gradient(90deg, #00d2ff, #00ff88); transition: width 0.1s; }
        
        #clickToStart { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 200; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; 
            background: linear-gradient(rgba(20, 0, 40, 0.4), rgba(10, 0, 20, 0.8)), 
                        url('https://images.unsplash.com/photo-1542362567-b07e54358753?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            background-color: #0b001a;
        }
        #clickToStart h1 { color: #fff; font-size: 110px; letter-spacing: 15px; margin: 0 0 20px 0; text-transform: uppercase; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055, 0 0 40px #ff0055, 0 0 80px #ff0055; }
        #clickToStart p { color: #0ff; font-size: 32px; font-weight: bold; letter-spacing: 8px; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        /* 獨立音量控制面板 */
        #volumeControl {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
            background: rgba(0, 0, 0, 0.75); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(8px); align-items: flex-end;
        }
        .vol-row { display: flex; align-items: center; gap: 10px; }
        .vol-row label { font-size: 13px; font-weight: bold; cursor: pointer; color: #ddd; width: 65px; text-align: right; }
        .vol-row input[type="range"] { cursor: pointer; width: 100px; accent-color: #00d2ff; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="volumeControl">
        <div class="vol-row">
            <label for="weatherVolume">⛈️ 天氣</label>
            <input type="range" id="weatherVolume" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="vol-row">
            <label for="sfxVolume">💥 音效</label>
            <input type="range" id="sfxVolume" min="0" max="1" step="0.01" value="0.6">
        </div>
        <div class="vol-row">
            <label for="bgmVolume">🎵 音樂</label>
            <input type="range" id="bgmVolume" min="0" max="1" step="0.01" value="0.4">
        </div>
        
        <div style="margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; width: 100%; display: flex; flex-direction: column; gap: 5px; align-items: flex-end;">
            <label style="font-size: 13px; font-weight: bold; color: #ddd; cursor: pointer;">🎧 切換背景音樂</label>
            <select id="musicSelect" style="background: rgba(0,0,0,0.6); color: #00d2ff; border: 1px solid rgba(255,255,255,0.3); border-radius: 5px; padding: 5px; cursor: pointer; outline: none; font-size: 12px; width: 175px;">
                <option value="https://raw.githubusercontent.com/DaiChi-WW/game-music/main/8%20Bits%20are%20Scary%20Assault%20-%20Pippu%20(youtube).mp3">🎵 音樂一：8 bits are scary</option>
                <option value="https://raw.githubusercontent.com/DaiChi-WW/game-music/main/MAX%20COVERI%20_%20RUNNING%20IN%20THE%2090S%E3%80%90%E9%A0%AD%E6%96%87%E5%AD%97D_INITIAL%20D%E3%80%91%20-%20avex%20(youtube).mp3">🎵 音樂二：RUNNING IN THE 90S</option>
            </select>
        </div>
    </div>

    <audio id="bgMusic" loop>

    </audio>

    <div id="clickToStart">
        <h1>玩命關頭</h1>
